<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>infra-feasibility-ai Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-900">
    <nav class="bg-blue-900 text-white p-4 flex justify-between items-center shadow-lg">
        <h1 class="text-xl font-bold flex items-center gap-2">
            <i data-lucide="globe"></i> infra-feasibility-ai <span class="text-blue-300 font-normal text-sm">v2.0</span>
        </h1>
        <div id="auth-nav" class="hidden">
            <span id="user-display" class="mr-4 text-sm opacity-80"></span>
            <button onclick="logout()" class="bg-blue-700 px-4 py-1.5 rounded-lg hover:bg-blue-600 transition text-sm font-medium">Logout</button>
        </div>
    </nav>

    <div class="container mx-auto p-6 max-w-7xl">
        <div id="login-view" class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-xl mt-20">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-extrabold text-gray-900">Welcome Back</h2>
                <p class="text-gray-500 mt-2">Access your infrastructure portfolio</p>
            </div>
            <div class="space-y-4">
                <input id="login-user" type="text" placeholder="Username / Email" class="w-full p-3.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                <input id="login-pass" type="password" placeholder="Password" class="w-full p-3.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white p-3.5 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-200">Sign In</button>
            </div>
        </div>

        <div id="dashboard-view" class="hidden">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
                <div>
                    <h2 class="text-4xl font-black text-gray-900">Project Portfolio</h2>
                    <p class="text-gray-500">Manage and analyze your global energy investments</p>
                </div>
                <button onclick="showModal('project-modal')" class="bg-green-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-green-700 transition flex items-center gap-2 shadow-lg shadow-green-100">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i> New Project
                </button>
            </div>
            <div id="projects-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>
    </div>

    <div id="project-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl w-full max-w-2xl p-8 shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold">Create New Project</h3>
                <button onclick="hideModal('project-modal')" class="text-gray-400 hover:text-gray-600"><i data-lucide="x"></i></button>
            </div>
            <form id="project-form" onsubmit="handleCreateProject(event)" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="md:col-span-2">
                    <label class="block text-sm font-bold text-gray-700 mb-2">Project Name</label>
                    <input name="name" required class="w-full p-3 border rounded-xl" placeholder="e.g. Al-Muthanna Solar Park">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Technology</label>
                    <select name="technology" class="w-full p-3 border rounded-xl">
                        <option value="solar">Solar PV</option>
                        <option value="wind">Onshore Wind</option>
                        <option value="waste-to-energy">Waste to Energy</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Country Code (ISO)</label>
                    <input name="country_code" required class="w-full p-3 border rounded-xl" placeholder="IQ, KZ, SL...">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Latitude</label>
                    <input name="lat" type="number" step="0.001" required class="w-full p-3 border rounded-xl">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Longitude</label>
                    <input name="lon" type="number" step="0.001" required class="w-full p-3 border rounded-xl">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Capacity (MW)</label>
                    <input name="capacity_mw" type="number" required class="w-full p-3 border rounded-xl">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">CAPEX ($/MW)</label>
                    <input name="capex_per_mw" type="number" required class="w-full p-3 border rounded-xl" value="850000">
                </div>
                <div class="md:col-span-2 mt-4">
                    <button type="submit" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold hover:bg-blue-700 shadow-xl transition">Initialize Project</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API = axios.create({ baseURL: 'http://localhost:8000' });
        let TOKEN = localStorage.getItem('token');
        if (TOKEN) { setupAuth(TOKEN); showDashboard(); }
        function setupAuth(token) { API.defaults.headers.common['Authorization'] = `Bearer ${token}`; document.getElementById('auth-nav').classList.remove('hidden'); }
        async function handleLogin() {
            const username = document.getElementById('login-user').value;
            const password = document.getElementById('login-pass').value;
            try {
                const res = await API.post('/auth/token', { username, password });
                TOKEN = res.data.access_token;
                localStorage.setItem('token', TOKEN);
                setupAuth(TOKEN);
                showDashboard();
            } catch (err) { alert('Authentication failed.'); }
        }
        function logout() { localStorage.clear(); window.location.reload(); }
        function showDashboard() {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('dashboard-view').classList.remove('hidden');
            loadProjects();
        }
        async function loadProjects() {
            try {
                const res = await API.get('/projects');
                const list = document.getElementById('projects-list');
                list.innerHTML = res.data.map(p => `
                    <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 hover:shadow-xl transition-all">
                        <div class="flex justify-between items-start mb-6">
                            <div><h3 class="text-2xl font-bold text-gray-900">${p.name}</h3><p class="text-blue-600 font-medium text-sm mt-1 uppercase">${p.technology}</p></div>
                            <span class="bg-blue-50 text-blue-700 text-[10px] font-black px-2.5 py-1 rounded-lg border border-blue-100 uppercase">${p.status}</span>
                        </div>
                        <div class="grid grid-cols-2 gap-4 mb-8 text-sm">
                            <div class="p-3 bg-gray-50 rounded-2xl"><p class="text-gray-400 text-xs">Region</p><p class="font-bold text-gray-700">${p.country_code}</p></div>
                            <div class="p-3 bg-gray-50 rounded-2xl"><p class="text-gray-400 text-xs">Capacity</p><p class="font-bold text-gray-700">${p.capacity_mw} MW</p></div>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="startAnalysis('${p.id}')" class="flex-1 bg-blue-600 text-white py-3 rounded-2xl text-sm font-bold hover:bg-blue-700 shadow-lg shadow-blue-100 transition">Run AI Analysis</button>
                            <button onclick="window.open('http://localhost:8000/export/'+'${p.id}'+'/pdf')" class="p-3 bg-white border border-gray-200 rounded-2xl hover:bg-gray-50 transition"><i data-lucide="file-text"></i></button>
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (err) { console.error(err); }
        }
        async function handleCreateProject(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            ['lat', 'lon', 'capacity_mw', 'capex_per_mw'].forEach(key => data[key] = parseFloat(data[key]));
            data.opex_per_mw_year = 15000;
            data.electricity_price_usd_mwh = 75;
            try { await API.post('/projects', data); hideModal('project-modal'); loadProjects(); e.target.reset(); } catch (err) { alert('Failed'); }
        }
        async function startAnalysis(id) { try { await API.post(\`/analyze/\${id}\`); alert('Analysis queued.'); loadProjects(); } catch (err) { alert('Failed'); } }
        function showModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function hideModal(id) { document.getElementById(id).classList.add('hidden'); }
        lucide.createIcons();
    </script>
</body>
</html>
