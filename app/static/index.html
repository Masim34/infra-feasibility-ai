<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>infra-feasibility-ai Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-900">
    <nav class="bg-blue-900 text-white p-4 flex justify-between items-center shadow-lg sticky top-0 z-40">
        <h1 class="text-xl font-bold flex items-center gap-2">
            <i data-lucide="globe"></i> infra-feasibility-ai <span class="text-blue-300 font-normal text-sm">v2.1</span>
        </h1>
        <div id="auth-nav" class="hidden flex items-center gap-4">
            <span id="user-display" class="text-sm opacity-80"></span>
            <button onclick="logout()" class="bg-blue-700 px-4 py-1.5 rounded-lg hover:bg-blue-600 transition text-sm font-medium">Logout</button>
        </div>
    </nav>

    <div class="container mx-auto p-6 max-w-7xl min-h-screen">
        <div id="login-view" class="max-w-md mx-auto bg-white p-10 rounded-3xl shadow-2xl mt-20 border border-gray-100">
            <div class="text-center mb-8">
                <div class="inline-block p-3 bg-blue-50 rounded-2xl mb-4 text-blue-600"><i data-lucide="shield-check" class="w-10 h-10"></i></div>
                <h2 class="text-3xl font-black text-gray-900">SaaS Access</h2>
                <p class="text-gray-500 mt-2">Global Infrastructure Investment Platform</p>
            </div>
            <div class="space-y-4">
                <input id="login-user" type="text" placeholder="Username / Email" class="w-full p-4 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition" value="analyst">
                <input id="login-pass" type="password" placeholder="Password" class="w-full p-4 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition" value="password">
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-black hover:bg-blue-700 transition shadow-xl shadow-blue-200">ENTER DASHBOARD</button>
            </div>
        </div>

        <div id="dashboard-view" class="hidden">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
                <div>
                    <h2 class="text-4xl font-black text-gray-900">Project Portfolio</h2>
                    <p class="text-gray-500 mt-1">GGC Infrastructure Analysis & Feasibility Reports</p>
                </div>
                <button onclick="showModal('project-modal')" class="bg-green-600 text-white px-8 py-3.5 rounded-2xl font-bold hover:bg-green-700 transition flex items-center gap-2 shadow-lg shadow-green-100">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i> Initialize New Project
                </button>
            </div>
            <div id="projects-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>
    </div>

    <div id="project-modal" class="fixed inset-0 bg-black/60 backdrop-blur-md hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[2.5rem] w-full max-w-2xl p-10 shadow-3xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-3xl font-black text-gray-900">Configure Project</h3>
                <button onclick="hideModal('project-modal')" class="text-gray-400 hover:text-gray-600 bg-gray-100 p-2 rounded-full transition"><i data-lucide="x"></i></button>
            </div>
            <form id="project-form" onsubmit="handleCreateProject(event)" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="md:col-span-2">
                    <label class="block text-sm font-black text-gray-700 mb-2 uppercase tracking-wide">Project Name</label>
                    <input name="name" required class="w-full p-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. Al-Muthanna Solar Park">
                </div>
                <div>
                    <label class="block text-sm font-black text-gray-700 mb-2 uppercase tracking-wide">Technology</label>
                    <select name="technology" class="w-full p-4 bg-gray-50 border-none rounded-2xl outline-none">
                        <option value="solar">Solar PV</option>
                        <option value="wind">Onshore Wind</option>
                        <option value="waste-to-energy">Waste to Energy</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-black text-gray-700 mb-2 uppercase tracking-wide">Country (ISO)</label>
                    <input name="country_code" required class="w-full p-4 bg-gray-50 border-none rounded-2xl outline-none" placeholder="IQ, KZ, SL, MG, PK">
                </div>
                <div><label class="block text-sm font-black text-gray-700 mb-2 uppercase tracking-wide">Lat</label><input name="lat" type="number" step="0.001" required class="w-full p-4 bg-gray-50 border-none rounded-2xl outline-none" value="33.312"></div>
                <div><label class="block text-sm font-black text-gray-700 mb-2 uppercase tracking-wide">Lon</label><input name="lon" type="number" step="0.001" required class="w-full p-4 bg-gray-50 border-none rounded-2xl outline-none" value="44.361"></div>
                <div><label class="block text-sm font-black text-gray-700 mb-2 uppercase tracking-wide">Capacity (MW)</label><input name="capacity_mw" type="number" required class="w-full p-4 bg-gray-50 border-none rounded-2xl outline-none" value="100"></div>
                <div><label class="block text-sm font-black text-gray-700 mb-2 uppercase tracking-wide">Capex ($/MW)</label><input name="capex_per_mw" type="number" required class="w-full p-4 bg-gray-50 border-none rounded-2xl outline-none" value="850000"></div>
                <div class="md:col-span-2 mt-6">
                    <button type="submit" class="w-full bg-blue-600 text-white p-5 rounded-3xl font-black text-lg hover:bg-blue-700 shadow-2xl shadow-blue-100 transition transform hover:scale-[1.02]">LAUNCH ANALYSIS</button>
                </div>
            </form>
        </div>
    </div>

    <div id="narrative-modal" class="fixed inset-0 bg-black/60 backdrop-blur-md hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[2.5rem] w-full max-w-4xl p-10 shadow-3xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-8 border-b pb-6">
                <h3 class="text-3xl font-black text-blue-900 flex items-center gap-3"><i data-lucide="sparkles" class="w-8 h-8"></i> AI EXECUTIVE SUMMARY</h3>
                <button onclick="hideModal('narrative-modal')" class="text-gray-400 hover:text-gray-600 bg-gray-100 p-2 rounded-full transition"><i data-lucide="x"></i></button>
            </div>
            <div id="narrative-content" class="text-gray-700 leading-loose text-lg whitespace-pre-wrap font-serif"></div>
        </div>
    </div>

    <script>
        const API = axios.create({ baseURL: 'http://localhost:8000' });
        let TOKEN = localStorage.getItem('token');
        if (TOKEN) { setupAuth(TOKEN); showDashboard(); }
        function setupAuth(token) { API.defaults.headers.common['Authorization'] = `Bearer ${token}`; document.getElementById('auth-nav').classList.remove('hidden'); }
        async function handleLogin() {
            try {
                const res = await API.post('/auth/token', { username: document.getElementById('login-user').value, password: document.getElementById('login-pass').value });
                TOKEN = res.data.access_token; localStorage.setItem('token', TOKEN); setupAuth(TOKEN); showDashboard();
            } catch (err) { alert('Auth failed'); }
        }
        function logout() { localStorage.clear(); window.location.reload(); }
        function showDashboard() { document.getElementById('login-view').classList.add('hidden'); document.getElementById('dashboard-view').classList.remove('hidden'); loadProjects(); }
        async function loadProjects() {
            try {
                const res = await API.get('/projects');
                const list = document.getElementById('projects-list');
                list.innerHTML = res.data.map(p => `
                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-100 hover:shadow-2xl transition-all duration-300 group">
                        <div class="flex justify-between items-start mb-6">
                            <div><h3 class="text-2xl font-black text-gray-900 group-hover:text-blue-600 transition">${p.name}</h3><p class="text-blue-500 font-bold text-xs mt-1 uppercase tracking-widest">${p.technology}</p></div>
                            <span class="bg-blue-50 text-blue-700 text-[10px] font-black px-3 py-1.5 rounded-xl border border-blue-100 uppercase">${p.status}</span>
                        </div>
                        <div class="grid grid-cols-2 gap-4 mb-8">
                            <div class="p-4 bg-gray-50 rounded-2xl"><p class="text-gray-400 text-[10px] font-black uppercase tracking-tighter mb-1">Region</p><p class="font-black text-gray-800">${p.country_code}</p></div>
                            <div class="p-4 bg-gray-50 rounded-2xl"><p class="text-gray-400 text-[10px] font-black uppercase tracking-tighter mb-1">Capacity</p><p class="font-black text-gray-800">${p.capacity_mw} MW</p></div>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="startAnalysis('${p.id}')" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl text-sm font-black hover:bg-blue-700 shadow-xl shadow-blue-100 transition">ANALYZE</button>
                            <button onclick="viewNarrative('${p.id}')" class="px-5 bg-gray-900 text-white rounded-2xl hover:bg-gray-800 transition"><i data-lucide="sparkles" class="w-5 h-5"></i></button>
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (err) { console.error(err); }
        }
        async function handleCreateProject(e) {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(e.target).entries());
            ['lat', 'lon', 'capacity_mw', 'capex_per_mw'].forEach(k => data[k] = parseFloat(data[k]));
            try { await API.post('/projects', data); hideModal('project-modal'); loadProjects(); e.target.reset(); } catch (err) { alert('Failed'); }
        }
        async function startAnalysis(id) { try { await API.post(\`/analyze/\${id}\`); alert('Analysis queued.'); loadProjects(); } catch (err) { alert('Failed'); } }
        async function viewNarrative(projectId) {
            showModal('narrative-modal');
            document.getElementById('narrative-content').innerHTML = "Fetching AI narrative report...";
            try {
                const res = await API.get('/projects'); 
                const proj = res.data.find(p => p.id === projectId);
                document.getElementById('narrative-content').innerHTML = proj.narrative_report || "No AI narrative generated yet. Please run analysis first.";
            } catch (err) { document.getElementById('narrative-content').innerHTML = "Error fetching report."; }
        }
        function showModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function hideModal(id) { document.getElementById(id).classList.add('hidden'); }
        lucide.createIcons();
    </script>
</body>
</html>
