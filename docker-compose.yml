version: '3.8'

services:
  backend:
    build: .
    container_name: infra-backend
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/infraai
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - infra-network

  worker:
    build: .
    container_name: infra-worker
    command: celery -A app.services.worker.celery_app worker --loglevel=info
    env_file:
      - .env.example
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/infraai
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - infra-network

  db:
    image: postgres:15-alpine
    container_name: infra-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=infraai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - infra-network

  redis:
    image: redis:7-alpine
    container_name: infra-redis
    networks:
      - infra-network

networks:
  infra-network:
    driver: bridge

volumes:
  postgres_data:
